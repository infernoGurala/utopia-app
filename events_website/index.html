<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utopia Events — Redirecting to App</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #121214;
            --surface: #1a1a1e;
            --border: #2a2a32;
            --text: #f3f4f6;
            --sub: #9ca3af;
            --primary: #ff5733; /* Vibrant orange matching Utopia Campus Events theme */
            --primary-glow: rgba(255, 87, 51, 0.15);
            --success: #10b981;
            --font: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle premium dot grid background */
        .background-dots {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.4;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 40px 24px;
            text-align: center;
        }

        .card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        /* Micro-interactions: subtle float */
        .card:hover {
            transform: translateY(-4px);
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--primary), #ff7e5f);
            box-shadow: 0 8px 24px var(--primary-glow);
            margin-bottom: 28px;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 87, 51, 0.4); }
            70% { box-shadow: 0 0 0 16px rgba(255, 87, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 87, 51, 0); }
        }

        .logo-icon {
            font-size: 36px;
            color: #ffffff;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #e5e7eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 15px;
            color: var(--sub);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Action Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 24px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
            box-shadow: 0 6px 20px var(--primary-glow);
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            background-color: #ff6d4d;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 87, 51, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .divider {
            height: 1px;
            background-color: var(--border);
            margin: 28px 0;
            position: relative;
        }

        .divider::before {
            content: "OR";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--surface);
            padding: 0 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--sub);
            letter-spacing: 1px;
        }

        .download-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--sub);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .store-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .store-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .store-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--sub);
        }

        .store-icon {
            font-size: 16px;
        }

        /* Dynamic event info badge */
        .event-badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(255, 87, 51, 0.08);
            border: 1px solid rgba(255, 87, 51, 0.2);
            color: var(--primary);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none; /* Shown dynamically if event ID exists */
        }
    </style>
</head>
<body>
    <div class="background-dots"></div>

    <div class="container">
        <div class="card">
            <div class="logo-container">
                <!-- Premium dynamic custom icon using simple CSS shapes -->
                <span class="logo-icon">🚀</span>
            </div>

            <div id="event-badge" class="event-badge">Campus Event Included</div>

            <h1 id="main-title">Opening Utopia...</h1>
            <p id="main-status">We are redirecting you to open this event inside the Utopia App. Please wait a moment.</p>

            <div id="loading-spinner" class="spinner"></div>

            <button id="open-btn" class="btn btn-primary">Open in Utopia App</button>
            
            <div class="divider"></div>

            <div class="download-title">Don't have the app?</div>
            <div class="store-buttons">
                <a href="https://inferalis.space/download-utopia" target="_blank" class="store-btn">
                    <span class="store-icon">🤖</span> Google Play
                </a>
                <a href="https://inferalis.space/download-utopia" target="_blank" class="store-btn">
                    <span class="store-icon">🍎</span> App Store
                </a>
            </div>
        </div>
    </div>

    <script>
        // Extract event ID from URL path segment (e.g. events.inferalis.space/eventID)
        function getEventId() {
            const path = window.location.pathname;
            const segments = path.split('/').filter(s => s.length > 0);
            
            // If path contains segments, return the first one as event ID
            if (segments.length > 0) {
                // Ignore general common web paths if they occur
                const ignore = ['index.html', 'join', 'download', 'assets'];
                if (!ignore.includes(segments[0])) {
                    return segments[0];
                }
            }
            return null;
        }

        const eventId = getEventId();
        const customSchemeUrl = eventId ? `utopia://event/${eventId}` : 'utopia://home';

        // Update UI dynamically if event ID is present
        if (eventId) {
            document.getElementById('event-badge').style.display = 'inline-flex';
            document.getElementById('main-title').innerText = 'Event Found!';
            document.getElementById('main-status').innerText = 'Click below to open the event in your Utopia app instantly, or download the app if you don\'t have it yet.';
        }

        // Automatic redirect function
        function tryRedirect() {
            // Attempt to open the custom scheme
            window.location.href = customSchemeUrl;

            // Optional fallback: if the app isn't installed, hide spinner after 3 seconds
            setTimeout(() => {
                const spinner = document.getElementById('loading-spinner');
                if (spinner) {
                    spinner.style.display = 'none';
                }
                document.getElementById('main-title').innerText = 'Open Utopia';
                document.getElementById('main-status').innerText = 'If the app did not open automatically, click the button below to launch it, or download the app below.';
            }, 3000);
        }

        // Setup manual buttons
        document.getElementById('open-btn').addEventListener('click', () => {
            window.location.href = customSchemeUrl;
        });

        // Trigger redirect on load
        window.addEventListener('load', () => {
            tryRedirect();
        });
    </script>
</body>
</html>
