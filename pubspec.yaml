name: utopia_app
description: UTOPIA student notes app.
publish_to: 'none'
version: 2.2.4+14

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^17.2.3
  http: ^1.6.0
  flutter_markdown: ^0.7.4
  markdown: ^7.3.0
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  dio: ^5.8.0
  open_filex: ^4.6.0
  crypto: ^3.0.6
  encrypt: ^5.0.3
  google_fonts: ^6.2.1
  connectivity_plus: ^6.1.3
  flutter_secure_storage: ^9.2.2
  flutter_math_fork: ^0.7.2
  webview_flutter: ^4.10.0
  package_info_plus: ^8.0.2
